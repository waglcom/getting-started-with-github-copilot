name: Step 0 # Start Exercise

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write
  issues: write

env:
  STEP_1_FILE: ".github/steps/1-step.md"

jobs:
  start_exercise:
    if: |
      !github.event.repository.is_template
    name: Start Exercise
    uses: skills/exercise-toolkit/.github/workflows/start-exercise.yml@v0.8.1
    with:
      exercise-title: "GitHub Copilot 시작하기"
      intro-message: "GitHub Copilot 시작하기 실습에 오신 것을 환영합니다. 이 실습에서는 AI 코딩 도우미인 GitHub Copilot을 사용해 프로젝트를 이해하고, 코드를 수정하고, 기능을 구현하고, pull request까지 마무리하는 흐름을 단계별로 연습합니다."

  localize_landing_page:
    if: |
      !github.event.repository.is_template
    name: Localize landing page
    runs-on: ubuntu-latest
    needs: [start_exercise]
    env:
      ISSUE_NUMBER: ${{ needs.start_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Replace exercise landing README
        shell: bash
        run: |
          git pull --rebase origin main

          cat > README.md <<'EOF'
          # GitHub Copilot 시작하기

          안녕하세요, @${{ github.actor }}님!

          Mona가 실습 환경 준비를 마쳤습니다. 이제 단계별 안내에 따라 GitHub Copilot의 주요 개발 흐름을 연습해 보세요.

          이 실습은 각자 속도에 맞춰 진행할 수 있습니다. 중간에 쉬었다가 다시 이어서 진행해도 괜찮습니다.

          [![실습 시작하기](https://img.shields.io/badge/%EC%8B%A4%EC%8A%B5%20%EC%8B%9C%EC%9E%91%ED%95%98%EA%B8%B0-%E2%86%92-1f883d?style=for-the-badge&logo=github&labelColor=197935)](https://github.com/${{ github.repository }}/issues/${{ env.ISSUE_NUMBER }})

          ---

          &copy; 2025 GitHub &bull; [행동 강령](https://www.contributor-covenant.org/version/2/1/code_of_conduct/code_of_conduct.md) &bull; [MIT 라이선스](LICENSE)
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "Localize exercise landing page [skip ci]"
            git push origin HEAD:main
          fi

  post_next_step_content:
    name: Post next step content
    runs-on: ubuntu-latest
    needs: [start_exercise, localize_landing_page]
    env:
      ISSUE_NUMBER: ${{ needs.start_exercise.outputs.issue-number }}
      ISSUE_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Get response templates
        uses: actions/checkout@v6
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_1_FILE }}
          vars: |
            login: ${{ github.actor }}
            full_repo_name: ${{ github.repository }}

      - name: Create comment - watching for progress
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: .github/markdown-templates/step-feedback/watching-for-progress.md

      - name: Enable next step workflow
        run: |
          gh workflow enable "Step 1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
